version: '3.8'

services:
  db:
    image: postgres:16
    container_name: meat_bot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rama
      POSTGRES_DB: meat_bot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  bot:
    build: .
    container_name: meat_bot_app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp
      - ./Fonts:/app/Fonts

volumes:
  postgres_data: